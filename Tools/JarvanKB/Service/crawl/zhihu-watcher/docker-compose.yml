services:
  zhihu-watcher:
    build:
      context: ../../..                      # repo root, so Engine/zhihu is in the build context
      dockerfile: Service/crawl/zhihu-watcher/Dockerfile
    container_name: jarvankb-zhihu-watcher
    restart: unless-stopped
    network_mode: host                       # reach cookie-manager at 127.0.0.1:48088 (host loopback) + zhihu.com
                                             # outbound; binds NO listening port (headless), so this is not a port mapping
    env_file:
      - ../../../.env                        # repo-root .env (gitignored): supplies MIMO_API_KEY for the classify path
    environment:
      - JARVANKB_LLM_CONFIG=/llm.yaml         # where LLMClient resolves the mimo profile inside the container
    volumes:
      - ./config:/config:ro                  # put zhihu-watcher.yaml here
      - ./data/state:/data/state             # seen-id JSON (persisted)
      # output_dir (/data/output in the yaml) is bind-mounted to the real Obsidian vault subdir:
      - "/home/shenzhou/Documents/Obsidian/JasonJarvan/ResourceBase资源库/Zhihu知乎:/data/output"
      - ../../../config/llm.yaml:/llm.yaml:ro # shared LLM config (gitignored); mimo profile -> mimo-v2.5
    # Zhihu is reached direct (the client sets trust_env=False); no proxy env needed.
