services:
  bilibili-watcher:
    build:
      context: ../../..                      # repo root, so Engine/bilibili is in the build context
      dockerfile: Service/crawl/bilibili-watcher/Dockerfile
    container_name: jarvankb-bilibili-watcher
    restart: unless-stopped
    network_mode: host                       # must reach BN at 127.0.0.1:3015 + SP-1 at :48088
    environment:
      # defensive: the frozen BiliNoteClient builds httpx without trust_env=False, so a host SOCKS
      # ALL_PROXY would crash the BN call (runbook §5 socksio gotcha). Force-clear proxy env.
      - ALL_PROXY=
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - NO_PROXY=127.0.0.1,localhost
    volumes:
      - ./config:/config:ro                  # put bilibili-watcher.yaml here
      - ./data/state:/data/state             # per-folder state JSON (persisted)
      # output_dir (/data/output in the yaml) is bind-mounted to the real Obsidian vault subdir:
      - "/home/shenzhou/Documents/Obsidian/JasonJarvan/ResourceBase资源库/BiliB站:/data/output"
    # bilibili + SP-1 are reached direct (clients set trust_env=False); no proxy env needed.
